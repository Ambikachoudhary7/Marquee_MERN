<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Pattern</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-container">
    <div class="box green tall"></div>

    <div class="box green wide"></div>
    <div class="box red"></div>

    <div class="box yellow"></div>
    <div class="box red"></div>
    <div class="box green tall-right"></div>

    <div class="box red"></div>
    <div class="box yellow"></div>
</div>

</body>
