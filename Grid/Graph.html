<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphical representation</title>
    <link rel="stylesheet" href="Graph.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="grid grid1">
            <i class="fa-solid fa-cart-shopping"></i>
            <h1>150</h1>
            <h2>New Orders</h2>
            <p>More info🔗</p>

        </div>
        <div class="grid grid2">
            <i class="fa-duotone fa-solid fa-square-poll-vertical"></i>
            <h1>53%</h1>
            <h2>Bounce Rate</h2>
            <p>More info🔗</p>

        </div>
        <div class="grid grid3">
            <i class="fa-thin fa-circle-user-circle-plus"></i>
            <h1>44</h1>
            <h2>User Registation</h2>
            <p>More info🔗</p>

        </div>
        <div class="grid grid4">
            <i class="fa-sharp-duotone fa-thin fa-bullseye-pointer"></i>
            <h1>65</h1>
            <h2>Unique Visitors </h2>
            <p>More info🔗</p>

        </div>

    </div>
</body>
</html>
