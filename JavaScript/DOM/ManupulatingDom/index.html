<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minupulating Dom</title>
</head>
<body>
    <ul id="fruits">
        
    </ul>
    <script>
       let arr = ["Apple", "Banana", "Grapsh,", "Orange"];
       const ulist = document.getElementById("fruits");
       arr.forEach(fruit => {
            const li = document.createElement('li'); 
            li.textContent = fruit;                 
            ulist.appendChild(li);                  
        });
    </script>
</body>
</html>
